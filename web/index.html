<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live2D Booth Preview Maker</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="app">
      <nav class="tabs" aria-label="画面切り替え">
        <button id="tabEditor" class="tab-button active" type="button" data-tab="editorPanel">編集</button>
        <button id="tabAssets" class="tab-button" type="button" data-tab="assetsPanel">素材管理</button>
        <button id="tabOutputs" class="tab-button" type="button" data-tab="outputsPanel">出力確認</button>
      </nav>

      <section id="editorPanel" class="tab-panel active">
      <section class="preview-section">
        <div class="preview-shell">
          <div id="preview" class="preview">
            <img id="backgroundPreview" alt="">
            <video id="motionPreview" muted loop playsinline></video>
          </div>
        </div>
      </section>

      <section class="transport">
        <button id="playButton" type="button">再生</button>
        <button id="pauseButton" type="button">一時停止</button>
        <button id="resetButton" type="button">先頭へ</button>
        <input id="seek" type="range" min="0" max="30" step="0.1" value="0">
        <span id="timeLabel">0.0 / 30.0秒</span>
        <audio id="bgmPreview" loop></audio>
        <div class="media-seek">
          <span>BGM開始位置</span>
          <input id="bgmSeek" type="range" min="0" max="0" step="0.1" value="0" disabled>
          <span id="bgmSeekLabel">0.0 / 0.0秒</span>
        </div>
      </section>

      <section class="workspace">
        <section class="panel">
          <h2>素材</h2>
          <label>背景テンプレート
            <select id="background"></select>
          </label>
          <label class="file-picker">
            <span>外部ファイル参照</span>
            <input id="backgroundUpload" type="file" accept=".png,.jpg,.jpeg">
          </label>
          <div class="asset-save-row">
            <input id="backgroundSaveName" type="text" placeholder="背景の保存名">
            <button id="saveBackgroundAsset" type="button">アプリ内ライブラリへ登録</button>
          </div>

          <label>Live2D動画
            <select id="motion"></select>
          </label>
          <label class="file-picker">
            <span>外部ファイル参照</span>
            <input id="motionUpload" type="file" accept=".webm,.mov,.mp4,.mkv">
          </label>
          <div class="asset-save-row">
            <input id="motionSaveName" type="text" placeholder="動画の保存名">
            <button id="saveMotionAsset" type="button">アプリ内ライブラリへ登録</button>
          </div>

          <label>BGMテンプレート
            <select id="bgm"></select>
          </label>
          <label class="file-picker">
            <span>外部ファイル参照</span>
            <input id="bgmUpload" type="file" accept=".mp3,.wav,.m4a">
          </label>
          <div class="asset-save-row">
            <input id="bgmSaveName" type="text" placeholder="BGMの保存名">
            <button id="saveBgmAsset" type="button">アプリ内ライブラリへ登録</button>
          </div>

          <label>出力先
            <input id="output" type="text" value="projects/product_001/output/preview.mp4">
          </label>
        </section>

        <section class="panel">
          <h2>設定</h2>
          <div class="grid">
            <label>幅<input id="width" type="number" min="1" value="1920"></label>
            <label>高さ<input id="height" type="number" min="1" value="1080"></label>
            <label>fps<input id="fps" type="number" min="1" value="30"></label>
            <label>秒数<input id="duration" type="number" min="1" value="30"></label>
          </div>

          <label>モデルX
            <input id="modelXRange" type="range" min="0" max="1920" value="960">
            <input id="model_x" type="number" value="960">
          </label>
          <label>モデルY
            <input id="modelYRange" type="range" min="0" max="1080" value="540">
            <input id="model_y" type="number" value="540">
          </label>
          <label>モデル拡大率
            <input id="scaleRange" type="range" min="0.1" max="3" step="0.05" value="1">
            <input id="model_scale" type="number" min="0.1" step="0.05" value="1">
          </label>
          <div class="grid">
            <label>動画開始秒<input id="motion_start" type="number" min="0" step="0.1" value="0"></label>
            <label>動画終了秒<input id="motion_end" type="number" min="0" step="0.1" placeholder="空欄可"></label>
            <label>BGM開始秒<input id="bgm_start" type="number" min="0" step="0.1" value="0"></label>
            <label>BGM終了秒<input id="bgm_end" type="number" min="0" step="0.1" placeholder="空欄可"></label>
          </div>
          <label>BGM音量
            <input id="volumeRange" type="range" min="0" max="1.5" step="0.05" value="0.6">
            <input id="bgm_volume" type="number" min="0" step="0.05" value="0.6">
          </label>
          <label>動画ビットレート
            <input id="video_bitrate" type="text" value="6000k">
          </label>
        </section>
      </section>

      <section class="actions">
        <label>プリセット
          <select id="presetList"></select>
        </label>
        <label>保存先
          <input id="presetPath" type="text" value="projects/product_001/preset.json">
        </label>
        <button id="loadPreset" type="button">読み込み</button>
        <button id="savePreset" type="button">保存</button>
        <button id="savePresetAs" type="button">別名保存</button>
        <button id="render" type="button">動画作成</button>
        <button id="cancelRender" type="button" disabled>キャンセル</button>
      </section>

      <pre id="log" class="log">起動しました。</pre>
      </section>

      <section id="assetsPanel" class="tab-panel">
        <section class="panel">
          <div class="panel-heading">
            <h2>素材管理</h2>
            <button id="refreshAssets" type="button">更新</button>
          </div>
          <div class="asset-manager">
            <section>
              <h3>背景</h3>
              <div id="assetBackgrounds" class="file-list"></div>
            </section>
            <section>
              <h3>動画</h3>
              <div id="assetMotions" class="file-list"></div>
            </section>
            <section>
              <h3>BGM</h3>
              <div id="assetBgms" class="file-list"></div>
            </section>
          </div>
        </section>
      </section>

      <section id="outputsPanel" class="tab-panel">
        <section class="panel">
          <div class="panel-heading">
            <h2>出力確認</h2>
            <button id="refreshOutputs" type="button">更新</button>
          </div>
          <div id="outputList" class="file-list"></div>
          <video id="outputPreview" class="output-preview" controls></video>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
